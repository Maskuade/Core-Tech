            top.location = self.location;
        }
    </script>

</head>

    <!-- CLEANED HIGH-PERFORMANCE STATIC SCRIPT -->
    <script>
        function stripHTML(html) {
            return html.replace(/<[^>]*>?/gm, ' ').replace(/\s+/g, ' ').trim();
        }

        function getFullDescription(html) {
            let text = stripHTML(html);
            return text.length > 0 ? text : "Technology article by CoreTech";
        }

        function generateStaticSchema() {
            const schemas = [];
            const articleTitle = document.querySelector('h1') ? document.querySelector('h1').innerText : document.title;
            const articleText = document.querySelector('.article-content-render') ? document.querySelector('.article-content-render').innerHTML : "";
            const featuredImg = document.querySelector('.featured-img') ? document.querySelector('.featured-img').src : "";
            const categoryText = document.querySelector('.category') ? document.querySelector('.category').innerText : "Technology";

            schemas.push({
                "@context": "https://schema.org",
                "@type": "TechArticle",
                "headline": articleTitle,
                "image": featuredImg,
                "description": getFullDescription(articleText),
                "author": { "@type": "Organization", "name": "CoreTech" },
                "publisher": { "@type": "Organization", "name": "CoreTech" },
                "mainEntityOfPage": { "@type": "WebPage", "@id": window.location.href },
                "datePublished": "2026-05-21T00:00:00Z"
            });

            const faqItems = document.querySelectorAll('.faq-item');
            if (faqItems.length > 0) {
                const mainEntity = [];
                faqItems.forEach(item => {
                    const q = item.querySelector('.faq-question') ? item.querySelector('.faq-question').innerText : "";
                    const a = item.querySelector('.faq-answer') ? item.querySelector('.faq-answer').innerText : "";
                    if (q && a) {
                        mainEntity.push({
                            "@type": "Question",
                            "name": q,
                            "acceptedAnswer": { "@type": "Answer", "text": stripHTML(a) }
                        });
                    }
                });
                if (mainEntity.length > 0) {
                    schemas.push({
                        "@context": "https://schema.org",
                        "@type": "FAQPage",
                        "mainEntity": mainEntity
                    });
                }
            }

            schemas.forEach(schema => {
                const script = document.createElement('script');
                script.type = 'application/ld+json';
                script.textContent = JSON.stringify(schema, null, 2);
                document.head.appendChild(script);
            });
        }




        const backToTop = document.getElementById('backToTop');
        window.addEventListener('scroll', () => {
            if (backToTop) backToTop.style.display = window.scrollY > 600 ? 'flex' : 'none';
        }, { passive: true });

        if (backToTop) {
            backToTop.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        document.addEventListener('DOMContentLoaded', generateStaticSchema);
        // FAQ Toggle Functionality
        document.addEventListener('DOMContentLoaded', function () {
            const faqItems = document.querySelectorAll('.faq-item');
            faqItems.forEach(item => {
                const question = item.querySelector('.faq-question');
                if (question) {
                    question.addEventListener('click', () => {
                        // Close other items (optional - remove if you want multiple open)
                        faqItems.forEach(other => {
                            if (other !== item && other.classList.contains('open')) {
                                other.classList.remove('open');
                            }
                        });
                        item.classList.toggle('open');
                    });
                }
            });
        });
    </script>
